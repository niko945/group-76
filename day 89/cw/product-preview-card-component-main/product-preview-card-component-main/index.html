<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <title>Frontend Mentor | Product preview card component</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="perent">
    <div>
      <img class="chanel" src="images/image-product-desktop.jpg">
    </div>
    <div class="child">
      <p class="diff">PERFUME</p>
      <h1>Gabrielle<br> Essence Eau<br>De Parfum</h1>
      <p class="other">A floral, solar and voluptuous
        interpretation composed by
        Olivier Polge, Perfumer-Creator
        for the House of CHANEL.</p><br>
      <div id="price">
        <h1 class="h1">$149.99</h1>
        <h6>$169.99</h6>

        <img src="images/icon-cart.svg">

      </div>
    </div>
  </div>

</body>

</html>
