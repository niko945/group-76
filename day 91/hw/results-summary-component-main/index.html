<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="perent">
    <div class="left">
      <h4>Your Result</h4>
      <div class="score">
        <h1>76</h1>
        <p>of 100</p>
      </div>
      <h2>Great</h2>
      <p class="other">You scored higher than 65% of the people who have taken<br> these tests.</p>
    </div>
    <div class="right">
      <h4>Summary</h4>
        <div class="stats" id="Reaction">
          <img src="assets/images/icon-reaction.svg">
          <p>Reaction</p>
          <p>80 </p>
          <p>/ 100</p>
        </div>
        <div class="stats" id="Memory">
          <img src="assets/images/icon-memory.svg">
          <p>Memory</p>
          <p>92 </p>
          <p>/ 100</p>
        </div>
        <div class="stats" id="Verbal">
          <img src="assets/images/icon-verbal.svg">
          <p>Verbal</p>
          <p>61 </p>
          <p>/ 100</p>
        </div>
        <div class="stats" id="Visual">
          <img src="assets/images/icon-visual.svg">
          <p>Visual</p>
          <p>72 </p>
          <p>/ 100</p>
        </div>
        <button>Continue</button>
    </div>
  </div>

</body>

</html>
